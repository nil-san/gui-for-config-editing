<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OwO-Dusk Config Editor</title>
<style>
  :root{
    --bg:#11151a;
    --panel:#171c23;
    --panel2:#1e252e;
    --border:#2a3340;
    --text:#dbe2ea;
    --muted:#8694a3;
    --accent:#5fd0a0;
    --accent2:#e8b34f;
    --danger:#e0667a;
    --mono:'JetBrains Mono','Fira Code',Consolas,monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Inter',system-ui,sans-serif; font-size:14px;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:var(--panel); border-bottom:1px solid var(--border);
    padding:14px 20px; display:flex; align-items:center; gap:14px;
  }
  header h1{
    font-size:13px; margin:0; font-family:var(--mono); font-weight:500;
    color:var(--muted); letter-spacing:0.02em;
  }
  .title-block{display:flex; flex-direction:column; gap:1px;}
  .brand{
    font-size:20px; font-family:var(--mono); font-weight:700; color:var(--accent);
    letter-spacing:0.02em;
  }
  header .spacer{flex:1;}
  .btn{
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
    padding:7px 14px; border-radius:6px; cursor:pointer; font-size:13px;
    font-family:inherit; transition:border-color .15s, background .15s;
  }
  .btn:hover{border-color:var(--accent); background:#222933;}
  .btn.primary{background:var(--accent); color:#0c1410; border-color:var(--accent); font-weight:600;}
  .btn.primary:hover{filter:brightness(1.08);}
  .btn.danger{color:var(--danger); border-color:#3a2530;}
  .btn.danger:hover{border-color:var(--danger);}
  input[type=file]{display:none;}
  #status{font-size:12px; color:var(--muted); font-family:var(--mono);}
  main{max-width:1000px; margin:0 auto; padding:24px 20px 80px;}
  .search{
    width:100%; padding:9px 12px; margin-bottom:18px;
    background:var(--panel); border:1px solid var(--border); border-radius:6px;
    color:var(--text); font-size:13px; font-family:inherit;
  }
  .search:focus{outline:none; border-color:var(--accent);}
  details.node{
    border:1px solid var(--border); border-radius:8px; margin-bottom:10px;
    background:var(--panel); overflow:visible;
  }
  details.node > summary{border-radius:8px 8px 0 0;}
  details.node:not([open]) > summary{border-radius:8px;}
  details.node[open] > summary{border-bottom:1px solid var(--border);}
  summary{
    cursor:pointer; padding:11px 14px; font-family:var(--mono); font-weight:600;
    font-size:13px; color:var(--text); display:flex; align-items:center; gap:8px;
    list-style:none; user-select:none;
  }
  summary::-webkit-details-marker{display:none;}
  summary::before{content:"▸"; color:var(--muted); font-size:11px; transition:transform .15s;}
  details[open] > summary::before{transform:rotate(90deg);}
  summary .badge{
    font-family:'Inter',sans-serif; font-weight:400; font-size:11px; color:var(--muted);
    background:var(--panel2); padding:2px 7px; border-radius:10px; margin-left:auto;
  }
  .node-body{padding:10px 14px 14px;}
  details.node.section-disabled > summary{opacity:0.6;}
  details.node.section-disabled > summary .badge{background:#332a1c; color:var(--accent2);}
  details.node.section-disabled > .node-body{opacity:0.4; pointer-events:none; filter:grayscale(0.4);}
  details.node.section-disabled > .node-body > .row[data-key="enabled"]{
    opacity:1; pointer-events:auto; filter:none;
  }
  .exclusive-note{
    margin:0 14px 12px; padding:9px 11px; background:#2a2018; border:1px solid #4a3420;
    color:var(--accent2); border-radius:6px; font-size:11.5px; line-height:1.5;
    font-family:'Inter',sans-serif;
  }
  .row{
    display:flex; align-items:center; gap:10px; padding:7px 0;
    border-bottom:1px solid #1c232c;
  }
  .row:last-child{border-bottom:none;}
  .row > label{
    flex:0 0 230px; font-family:var(--mono); font-size:12.5px; color:var(--muted);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .row .field{flex:1; display:flex; gap:8px; align-items:center;}
  input[type=text], input[type=number]{
    width:100%; padding:6px 9px; background:var(--panel2); border:1px solid var(--border);
    border-radius:5px; color:var(--text); font-family:var(--mono); font-size:12.5px;
  }
  input[type=text]:focus, input[type=number]:focus{outline:none; border-color:var(--accent);}
  input.cooldown{width:80px;}
  .cooldown-sep{color:var(--muted); font-family:var(--mono);}
  .info-icon{
    position:relative; color:var(--muted); font-size:13px; cursor:help;
    flex-shrink:0; line-height:1; outline:none;
  }
  .info-icon:hover, .info-icon:focus{color:var(--accent);}
  .info-icon .tooltip-box{
    position:absolute; bottom:130%; right:-8px; width:240px;
    background:#262f3a; color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:12px 13px; font-size:12px; line-height:1.5;
    font-family:'Inter',sans-serif; font-weight:400; text-align:left;
    opacity:0; pointer-events:none; transform:translateY(4px);
    transition:opacity .12s, transform .12s; z-index:20;
    box-shadow:0 8px 20px rgba(0,0,0,.4);
  }
  .info-icon:hover .tooltip-box, .info-icon:focus .tooltip-box{
    opacity:1; transform:translateY(0); pointer-events:auto;
  }
  .tooltip-box .tt-row{display:flex; gap:8px; margin-bottom:7px;}
  .tooltip-box .tt-row:last-child{margin-bottom:0;}
  .tooltip-box .tt-tag{
    flex-shrink:0; font-family:var(--mono); font-size:10px; font-weight:700;
    padding:2px 6px; border-radius:4px; height:fit-content; letter-spacing:0.03em;
  }
  .tooltip-box .tt-tag.min{background:#1f4438; color:var(--accent);}
  .tooltip-box .tt-tag.max{background:#3a2f1a; color:var(--accent2);}
  .tooltip-box .tt-foot{
    margin-top:9px; padding-top:9px; border-top:1px solid var(--border);
    color:var(--muted); font-size:11.5px;
  }
  .toggle{
    position:relative; width:26px; height:15px; flex-shrink:0; cursor:pointer;
  }
  .toggle input{display:none;}
  .toggle .track{
    position:absolute; inset:0; background:#2a3340; border-radius:8px; transition:background .15s;
  }
  .toggle .thumb{
    position:absolute; top:2px; left:2px; width:11px; height:11px; border-radius:50%;
    background:#7c8a99; transition:transform .15s, background .15s;
  }
  .toggle input:checked + .track{background:#1f4438;}
  .toggle input:checked + .track + .thumb{transform:translateX(11px); background:var(--accent);}
  .arr-list{display:flex; flex-direction:column; gap:6px; width:100%;}
  .arr-item{display:flex; gap:6px; align-items:center;}
  .arr-item input{flex:1;}
  .icon-btn{
    background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px;
    padding:2px 6px; border-radius:4px; line-height:1;
  }
  .icon-btn:hover{color:var(--danger); background:#241a1f;}
  .add-row-btn{
    background:none; border:1px dashed var(--border); color:var(--muted);
    padding:5px 10px; border-radius:5px; cursor:pointer; font-size:12px; margin-top:4px;
    font-family:var(--mono);
  }
  .add-row-btn:hover{border-color:var(--accent); color:var(--accent);}
  .raw-wrap{display:none;}
  .raw-wrap.active{display:block;}
  #rawArea{
    width:100%; height:70vh; background:var(--panel); color:var(--text);
    border:1px solid var(--border); border-radius:8px; padding:14px;
    font-family:var(--mono); font-size:12.5px; line-height:1.5; resize:vertical;
  }
  .hidden{display:none !important;}
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--panel2); border:1px solid var(--accent); color:var(--text);
    padding:10px 18px; border-radius:7px; font-size:13px; opacity:0; pointer-events:none;
    transition:opacity .2s, transform .2s; font-family:var(--mono);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.error{border-color:var(--danger);}
</style>
</head>
<body>

<header>
  <div class="title-block">
    <div class="brand">OwO-Dusk Config Editor</div>
    <h1 class="hidden"></h1>
  </div>
  <span class="spacer"></span>
  <button class="btn hidden" id="rawToggleBtn">Raw JSON</button>
  <input type="file" id="fileInput" accept=".json,application/json">
  <button class="btn hidden" id="copyBtn">Copy JSON</button>
  <button class="btn primary hidden" id="downloadBtn">Download JSON</button>
</header>

<main>
  <input class="search hidden" id="search" type="text" placeholder="Filter settings by key… (e.g. cooldown, channel, gamble)">
  <div id="formRoot"></div>
  <div class="raw-wrap" id="rawWrap">
    <textarea id="rawArea" spellcheck="false"></textarea>
    <div style="margin-top:10px; display:flex; gap:8px;">
      <button class="btn primary" id="applyRawBtn">Apply raw JSON to form</button>
      <span id="rawError" style="color:var(--danger); font-family:var(--mono); font-size:12px; align-self:center;"></span>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ────────────────────────────────────────────────────────────────────────
// OPTIONAL: paste a config.json below to make it the starting default,
// so the page opens pre-filled instead of showing "Open file…" first.
// Leave as `null` to always start empty (recommended if you don't want
// real channel/user IDs sitting in a file you might push to GitHub).
// To update later, just replace the object below with your latest json.
const DEFAULT_DATA = null;
// ────────────────────────────────────────────────────────────────────────

let data = DEFAULT_DATA;
const formRoot = document.getElementById('formRoot');
const rawArea = document.getElementById('rawArea');
const rawWrap = document.getElementById('rawWrap');
const rawToggleBtn = document.getElementById('rawToggleBtn');
const statusEl = document.getElementById('status');

function toast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.classList.remove('show'), 2200);
}

function setStatus(msg){ if (statusEl) statusEl.textContent = msg; }

// Detect [low, high] cooldown-style arrays of 2 numbers
function isCooldownPair(val){
  return Array.isArray(val) && val.length === 2 && val.every(v => typeof v === 'number');
}
// Detect plain arrays of strings/numbers (simple lists)
function isSimpleList(val){
  return Array.isArray(val) && val.every(v => typeof v === 'string' || typeof v === 'number');
}

function countLeaves(val){
  if (Array.isArray(val)) return val.length || 1;
  if (val !== null && typeof val === 'object') return Object.keys(val).length;
  return 1;
}

function buildNode(container, obj, keyPath){
  Object.keys(obj).forEach(key => {
    const val = obj[key];
    const path = keyPath.concat(key);

    if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
      // nested object -> collapsible section
      const det = document.createElement('details');
      det.className = 'node';
      det.dataset.path = path.join('.');
      det.open = keyPath.length === 0; // top-level sections start open
      sectionRegistry[path.join('.')] = det;
      const sum = document.createElement('summary');
      sum.innerHTML = `${key}<span class="badge">${countLeaves(val)} setting${countLeaves(val)===1?'':'s'}</span>`;
      det.appendChild(sum);
      const body = document.createElement('div');
      body.className = 'node-body';
      det.appendChild(body);
      buildNode(body, val, path);
      container.appendChild(det);
      return;
    }

    if (isCooldownPair(val)) {
      container.appendChild(makeRow(key, path, makeCooldownField(val, path)));
      return;
    }

    if (Array.isArray(val) && val.length && typeof val[0] === 'object') {
      // array of objects (e.g. customCommands.commands) -> collapsible sub-list
      const det = document.createElement('details');
      det.className = 'node';
      det.dataset.path = path.join('.');
      const sum = document.createElement('summary');
      sum.innerHTML = `${key}<span class="badge">${val.length} item${val.length===1?'':'s'}</span>`;
      det.appendChild(sum);
      const body = document.createElement('div');
      body.className = 'node-body';
      det.appendChild(body);
      val.forEach((item, idx) => {
        const sub = document.createElement('details');
        sub.className = 'node';
        const subSum = document.createElement('summary');
        const label = item.command || item.name || `item ${idx+1}`;
        subSum.innerHTML = `#${idx+1} — ${escapeHtml(String(label).slice(0,40))}<span class="badge">×</span>`;
        const removeBtn = subSum.querySelector('.badge');
        removeBtn.classList.add('icon-btn');
        removeBtn.style.cursor = 'pointer';
        removeBtn.title = 'Remove item';
        removeBtn.addEventListener('click', e => {
          e.preventDefault(); e.stopPropagation();
          val.splice(idx, 1);
          renderForm();
        });
        sub.appendChild(subSum);
        const subBody = document.createElement('div');
        subBody.className = 'node-body';
        sub.appendChild(subBody);
        buildNode(subBody, item, path.concat(idx));
        body.appendChild(sub);
      });
      const addBtn = document.createElement('button');
      addBtn.className = 'add-row-btn';
      addBtn.textContent = '+ add item';
      addBtn.addEventListener('click', () => {
        const template = JSON.parse(JSON.stringify(val[val.length-1] || {}));
        val.push(template);
        renderForm();
      });
      body.appendChild(addBtn);
      container.appendChild(det);
      return;
    }

    if (key.toLowerCase() === 'userid' && Array.isArray(val)) {
      container.appendChild(makeRow(key, path, makeSingleIdField(val, path)));
      return;
    }

    if (isSimpleList(val) || (Array.isArray(val) && val.length === 0)) {
      container.appendChild(makeRow(key, path, makeListField(val, path)));
      return;
    }

    // primitive: boolean / number / string
    if (typeof val === 'boolean') {
      container.appendChild(makeRow(key, path, makeToggleField(val, path)));
    } else if (typeof val === 'number') {
      container.appendChild(makeRow(key, path, makeNumberField(val, path)));
    } else {
      container.appendChild(makeRow(key, path, makeTextField(val, path)));
    }
  });
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function makeRow(key, path, fieldEl){
  const row = document.createElement('div');
  row.className = 'row';
  row.dataset.key = key.toLowerCase();
  row.dataset.path = path.join('.').toLowerCase();
  const label = document.createElement('label');
  label.textContent = key;
  label.title = path.join(' › ');
  const fieldWrap = document.createElement('div');
  fieldWrap.className = 'field';
  fieldWrap.appendChild(fieldEl);
  row.appendChild(label);
  row.appendChild(fieldWrap);
  return row;
}

function getAt(path){
  let cur = data;
  for (const p of path) cur = cur[p];
  return cur;
}
function setAt(path, value){
  let cur = data;
  for (let i = 0; i < path.length - 1; i++) cur = cur[path[i]];
  cur[path[path.length-1]] = value;
}

// paths that can't both be enabled at once — enabling one disables the other
const MUTUALLY_EXCLUSIVE = [
  ['commands.pray.enabled', 'commands.curse.enabled']
];
const toggleRegistry = {};
const sectionRegistry = {};

function makeToggleField(val, path){
  const wrap = document.createElement('label');
  wrap.className = 'toggle';
  const input = document.createElement('input');
  input.type = 'checkbox';
  input.checked = val;
  const pathKey = path.join('.');
  toggleRegistry[pathKey] = input;
  input.addEventListener('change', () => {
    setAt(path, input.checked);
    if (input.checked) enforceMutualExclusion(pathKey);
    updateExclusiveSectionVisuals();
  });
  const track = document.createElement('span');
  track.className = 'track';
  const thumb = document.createElement('span');
  thumb.className = 'thumb';
  wrap.appendChild(input);
  wrap.appendChild(track);
  wrap.appendChild(thumb);
  return wrap;
}

function enforceMutualExclusion(enabledPathKey){
  MUTUALLY_EXCLUSIVE.forEach(pair => {
    if (!pair.includes(enabledPathKey)) return;
    const otherKey = pair.find(p => p !== enabledPathKey);
    const otherInput = toggleRegistry[otherKey];
    if (otherInput && otherInput.checked) {
      otherInput.checked = false;
      setAt(otherKey.split('.'), false);
      const otherName = otherKey.split('.').slice(-2, -1)[0];
      const thisName = enabledPathKey.split('.').slice(-2, -1)[0];
      toast(`Turned off "${otherName}" — can't run with "${thisName}" at the same time`);
    }
  });
}

function niceName(sectionPath){
  const seg = sectionPath.split('.').pop();
  return seg.charAt(0).toUpperCase() + seg.slice(1);
}

// grey out a section + explain why, when its mutually-exclusive partner is active
function applySectionLock(sectionPath, lockedByOtherPath){
  const det = sectionRegistry[sectionPath];
  if (!det) return;
  const lockedByOther = lockedByOtherPath
    ? !!getAt(lockedByOtherPath.split('.').concat('enabled'))
    : false;
  let note = det.querySelector(':scope > .exclusive-note');
  if (lockedByOther) {
    det.classList.add('section-disabled');
    if (!note) {
      note = document.createElement('div');
      note.className = 'exclusive-note';
      const nodeBody = det.querySelector(':scope > .node-body');
      det.insertBefore(note, nodeBody);
    }
    note.textContent = `Only one of ${niceName(sectionPath)} or ${niceName(lockedByOtherPath)} can run at a time — ${niceName(lockedByOtherPath)} is currently active. Flip the switch below to use ${niceName(sectionPath)} instead.`;
  } else {
    det.classList.remove('section-disabled');
    if (note) note.remove();
  }
}

function updateExclusiveSectionVisuals(){
  MUTUALLY_EXCLUSIVE.forEach(([aLeaf, bLeaf]) => {
    const aSection = aLeaf.split('.').slice(0, -1).join('.');
    const bSection = bLeaf.split('.').slice(0, -1).join('.');
    applySectionLock(aSection, bSection);
    applySectionLock(bSection, aSection);
  });
}

function makeNumberField(val, path){
  const input = document.createElement('input');
  input.type = 'number';
  input.step = 'any';
  input.value = val;
  input.addEventListener('change', () => {
    const n = parseFloat(input.value);
    setAt(path, isNaN(n) ? 0 : n);
  });
  return input;
}

function makeTextField(val, path){
  const input = document.createElement('input');
  input.type = 'text';
  input.value = val;
  input.addEventListener('change', () => setAt(path, input.value));
  return input;
}

function makeCooldownField(val, path){
  const wrap = document.createElement('div');
  wrap.style.display = 'flex';
  wrap.style.alignItems = 'center';
  wrap.style.gap = '6px';
  const lo = document.createElement('input');
  lo.type = 'number'; lo.step = 'any'; lo.className = 'cooldown'; lo.value = val[0];
  lo.title = 'Minimum cooldown (seconds)';
  const sep = document.createElement('span');
  sep.className = 'cooldown-sep'; sep.textContent = '–';
  const hi = document.createElement('input');
  hi.type = 'number'; hi.step = 'any'; hi.className = 'cooldown'; hi.value = val[1];
  hi.title = 'Maximum cooldown (seconds)';
  const note = document.createElement('span');
  note.className = 'cooldown-sep'; note.textContent = 'sec';
  const info = document.createElement('span');
  info.className = 'info-icon';
  info.tabIndex = 0;
  info.innerHTML = `ⓘ<span class="tooltip-box">
      <div class="tt-row"><span class="tt-tag min">LEFT</span><span>Shortest time to wait, in seconds, before doing this again.</span></div>
      <div class="tt-row"><span class="tt-tag max">RIGHT</span><span>Longest time to wait, in seconds, before doing this again.</span></div>
      <div class="tt-foot">Each time, the bot picks a random wait time between these two numbers — this helps it act more human.</div>
    </span>`;
  function commit(){
    const a = parseFloat(lo.value), b = parseFloat(hi.value);
    setAt(path, [isNaN(a)?0:a, isNaN(b)?0:b]);
  }
  lo.addEventListener('change', commit);
  hi.addEventListener('change', commit);
  wrap.append(lo, sep, hi, note, info);
  return wrap;
}

function makeSingleIdField(val, path){
  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'user ID (leave blank for none)';
  input.value = val.length ? val[0] : '';
  input.addEventListener('change', () => {
    const v = input.value.trim();
    setAt(path, v ? [v] : []);
  });
  return input;
}

function makeListField(val, path){
  const wrap = document.createElement('div');
  wrap.className = 'arr-list';
  function redraw(){
    wrap.innerHTML = '';
    val.forEach((item, idx) => {
      const itemRow = document.createElement('div');
      itemRow.className = 'arr-item';
      const input = document.createElement('input');
      input.type = 'text';
      input.value = item;
      input.addEventListener('change', () => {
        const n = parseFloat(input.value);
        val[idx] = (!isNaN(n) && String(n) === input.value.trim()) ? n : input.value;
      });
      const rm = document.createElement('button');
      rm.className = 'icon-btn'; rm.textContent = '✕'; rm.title = 'Remove';
      rm.addEventListener('click', () => { val.splice(idx,1); redraw(); });
      itemRow.appendChild(input);
      itemRow.appendChild(rm);
      wrap.appendChild(itemRow);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'add-row-btn';
    addBtn.textContent = '+ add value';
    addBtn.addEventListener('click', () => { val.push(''); redraw(); });
    wrap.appendChild(addBtn);
  }
  redraw();
  return wrap;
}

function renderForm(){
  formRoot.innerHTML = '';
  Object.keys(toggleRegistry).forEach(k => delete toggleRegistry[k]);
  Object.keys(sectionRegistry).forEach(k => delete sectionRegistry[k]);
  const guardedControls = [rawToggleBtn, document.getElementById('copyBtn'), document.getElementById('downloadBtn'), document.getElementById('search'), document.querySelector('h1')];
  if (data === null) {
    guardedControls.forEach(el => el.classList.add('hidden'));
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center; padding:60px 20px; color:var(--muted); border:1px dashed var(--border); border-radius:10px;';
    empty.innerHTML = `
      <div style="font-family:var(--mono); font-size:14px; color:var(--text); margin-bottom:8px;">No file loaded</div>
      <div style="font-size:13px; margin-bottom:18px;">Open a settings.json to start editing.</div>
    `;
    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex; gap:10px; justify-content:center;';
    const openBtn = document.createElement('button');
    openBtn.className = 'btn primary';
    openBtn.textContent = 'Open file…';
    openBtn.addEventListener('click', () => document.getElementById('fileInput').click());
    btnRow.append(openBtn);
    empty.appendChild(btnRow);
    formRoot.appendChild(empty);
    rawArea.value = '';
    setStatus('no file loaded');
    return;
  }
  guardedControls.forEach(el => el.classList.remove('hidden'));
  buildNode(formRoot, data, []);
  updateExclusiveSectionVisuals();
  rawArea.value = JSON.stringify(data, null, 4);
  setStatus('edited in browser · not yet downloaded');
}

// raw <-> form toggle
let rawMode = false;
rawToggleBtn.addEventListener('click', () => {
  rawMode = !rawMode;
  rawWrap.classList.toggle('active', rawMode);
  formRoot.classList.toggle('hidden', rawMode);
  document.getElementById('search').classList.toggle('hidden', rawMode);
  rawToggleBtn.textContent = rawMode ? 'Form view' : 'Raw JSON';
  if (rawMode) rawArea.value = JSON.stringify(data, null, 4);
});

document.getElementById('applyRawBtn').addEventListener('click', () => {
  const errEl = document.getElementById('rawError');
  try {
    const parsed = JSON.parse(rawArea.value);
    data = parsed;
    errEl.textContent = '';
    renderForm();
    toast('Raw JSON applied to form');
  } catch (e) {
    errEl.textContent = 'Invalid JSON: ' + e.message;
  }
});

// search filter
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  const allRows = formRoot.querySelectorAll('.row');
  const allDetails = formRoot.querySelectorAll('details.node');
  if (!q) {
    allRows.forEach(r => r.style.display = '');
    allDetails.forEach(d => { d.style.display = ''; });
    return;
  }
  allRows.forEach(r => {
    const match = r.dataset.path.includes(q) || r.dataset.key.includes(q);
    r.style.display = match ? '' : 'none';
  });
  // show/hide & open sections that contain a visible row
  allDetails.forEach(d => {
    const hasVisible = !!d.querySelector('.row:not([style*="display: none"])') ||
                        Array.from(d.querySelectorAll('details.node')).some(sd => sd.style.display !== 'none');
  });
  // second pass bottom-up for nested sections
  Array.from(allDetails).reverse().forEach(d => {
    const visibleRow = Array.from(d.querySelectorAll(':scope > .node-body > .row')).some(r => r.style.display !== 'none');
    const visibleSub = Array.from(d.querySelectorAll(':scope > .node-body > details.node')).some(sd => sd.style.display !== 'none');
    const show = visibleRow || visibleSub;
    d.style.display = show ? '' : 'none';
    if (show) d.open = true;
  });
});

// load file
document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      data = JSON.parse(reader.result);
      document.querySelector('h1').textContent = file.name;
      renderForm();
      toast('Loaded ' + file.name);
    } catch (err) {
      toast('Could not parse that file as JSON', true);
    }
  };
  reader.readAsText(file);
});

// download
document.getElementById('copyBtn').addEventListener('click', async () => {
  if (data === null) { toast('Open a file first', true); return; }
  if (rawMode) {
    try { data = JSON.parse(rawArea.value); }
    catch (e) { toast('Fix invalid JSON before copying', true); return; }
  }
  const text = JSON.stringify(data, null, 4);
  try {
    await navigator.clipboard.writeText(text);
    toast('Copied JSON to clipboard');
  } catch (e) {
    // fallback for environments without Clipboard API access
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      toast('Copied JSON to clipboard');
    } catch (e2) {
      toast('Could not copy automatically — try Raw JSON view and copy manually', true);
    }
    document.body.removeChild(ta);
  }
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (data === null) { toast('Open a file first', true); return; }
  if (rawMode) {
    try { data = JSON.parse(rawArea.value); }
    catch (e) { toast('Fix invalid JSON before downloading', true); return; }
  }
  const blob = new Blob([JSON.stringify(data, null, 4)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = document.querySelector('h1').textContent || 'config.json';
  a.click();
  URL.revokeObjectURL(url);
  setStatus('downloaded just now');
  toast('Downloaded ' + a.download);
});

// Load order: 1) an external template.json sitting next to this file
// (works when hosted on GitHub Pages or any http(s) server — lets you
// update the schema by just replacing template.json, no HTML edits),
// 2) the inline DEFAULT_DATA above, 3) empty state.
// Note: fetch of a local template.json will NOT work if you just
// double-click this html file (file:// blocks it) — only over http(s).
async function loadInitialData(){
  try {
    const res = await fetch('./template.json', {cache: 'no-store'});
    if (res.ok) {
      data = await res.json();
      document.querySelector('h1').textContent = 'config.json (template)';
      return;
    }
  } catch (e) {
    // no template.json reachable — fall through to inline default / empty
  }
  if (DEFAULT_DATA !== null) {
    data = DEFAULT_DATA;
    document.querySelector('h1').textContent = 'config.json (default)';
  }
}

loadInitialData().then(renderForm);
</script>
</body>
</html>
